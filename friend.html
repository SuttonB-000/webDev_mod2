        <h2>Join the Chuck Norris Fan Club</h2>
        <form id="fanForm">
    <div class="mb-3 mt-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div><label for="comment">Comments:</label>
<textarea class="form-control" rows="5" id="comment" name="text" placeholder="What excites you about our man Chuck?"></textarea>


    <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    </div>  
        <div id="successAlert" class="alert alert-success mt-3 d-none" role="alert">
      <p></p><strong>Success!</strong> Your submission was received. It goes nowhere '_'</p>
    </div>





    <!-- Bootstrap js from homepage, full bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        const form = document.getElementById("fanForm")
        const alert = document.getElementById("successAlert")

           form.addEventListener('submit', function(event) {
        event.preventDefault(); 
        alert.classList.remove('d-none'); 
    })
    </script>
